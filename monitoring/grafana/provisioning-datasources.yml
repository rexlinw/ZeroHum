# Grafana Data Source Provisioning Configuration
# Auto-configures Prometheus as a data source

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
    secureJsonData: {}

  - name: TestData
    type: testdata
    access: proxy
    isDefault: false
    editable: true
