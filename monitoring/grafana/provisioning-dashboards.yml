# Grafana Dashboard Provisioning Configuration
# Auto-loads dashboards from the provisioning directory

apiVersion: 1

providers:
  - name: 'ZEROHUM-CHAOS Dashboards'
    orgId: 1
    folder: 'ZEROHUM-CHAOS'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
