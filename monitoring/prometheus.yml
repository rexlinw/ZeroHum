# Prometheus configuration for ZEROHUM-CHAOS
# Monitors application health, container status, and system metrics

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'zerohum-chaos'
    project: 'self-healing-devops'

# Alerting configuration (minimal - no alert manager)
alerting:
  alert_relabel_configs: []

# Load rules files (we'll define basic rules)
rule_files: []

# Scrape configurations
scrape_configs:
  # Monitor Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 30s
    scrape_timeout: 10s

  # Monitor stable application
  - job_name: 'app-stable'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets: ['app-stable:5000']
        labels:
          instance: 'app-stable'
          version: 'stable'
          service: 'application'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      
  # Monitor buggy application (when deployed)
  - job_name: 'app-buggy'
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    static_configs:
      - targets: ['app-buggy:5000']
        labels:
          instance: 'app-buggy'
          version: 'buggy'
          service: 'application'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance

  # Docker container metrics (if cAdvisor is available)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Node exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s
    scrape_timeout: 10s
